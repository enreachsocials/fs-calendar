
<title>Future Schooling · Plan Contentu</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5F3EE;
  --surface:#FFFFFF;
  --green:#1B3A2C;
  --green2:#2C5E42;
  --green-light:#EAF2EC;
  --gold:#B8892A;
  --gold-light:#F9F3E8;
  --text:#1A1A18;
  --sub:#6B7060;
  --border:#DFE3D8;
  --border2:#C8D0C0;

  --s-bg:#FFF8EB;--s-col:#996600;--s-br:#F0D080;
  --i-bg:#EDF8F0;--i-col:#1A6B3C;--i-br:#90D8A8;
  --r-bg:#FFF0EE;--r-col:#B52A1A;--r-br:#F0A898;
  --v-bg:#EEF2FF;--v-col:#2040A8;--v-br:#A8B8F0;

  --note-bg:#FFFDF5;
  --note-border:#E8D89A;
}

@media(prefers-color-scheme:dark){:root{
  --bg:#111610;--surface:#1A2018;--green:#7EB898;--green2:#5A9070;
  --green-light:#192218;--gold:#C8A860;--gold-light:#221A08;
  --text:#E8EDE2;--sub:#8A9880;--border:#252E22;--border2:#303828;
  --s-bg:#2A2008;--s-col:#D4A030;--s-br:#5A4010;
  --i-bg:#0A2018;--i-col:#70D890;--i-br:#1A4828;
  --r-bg:#2A1008;--r-col:#F08070;--r-br:#5A2010;
  --v-bg:#0A1428;--v-col:#8090E0;--v-br:#182848;
  --note-bg:#1E1C10;--note-border:#3A3418;
}}
:root[data-theme="light"]{
  --bg:#F5F3EE;--surface:#FFFFFF;--green:#1B3A2C;--green2:#2C5E42;
  --green-light:#EAF2EC;--gold:#B8892A;--gold-light:#F9F3E8;
  --text:#1A1A18;--sub:#6B7060;--border:#DFE3D8;--border2:#C8D0C0;
  --s-bg:#FFF8EB;--s-col:#996600;--s-br:#F0D080;
  --i-bg:#EDF8F0;--i-col:#1A6B3C;--i-br:#90D8A8;
  --r-bg:#FFF0EE;--r-col:#B52A1A;--r-br:#F0A898;
  --v-bg:#EEF2FF;--v-col:#2040A8;--v-br:#A8B8F0;
  --note-bg:#FFFDF5;--note-border:#E8D89A;
}
:root[data-theme="dark"]{
  --bg:#111610;--surface:#1A2018;--green:#7EB898;--green2:#5A9070;
  --green-light:#192218;--gold:#C8A860;--gold-light:#221A08;
  --text:#E8EDE2;--sub:#8A9880;--border:#252E22;--border2:#303828;
  --s-bg:#2A2008;--s-col:#D4A030;--s-br:#5A4010;
  --i-bg:#0A2018;--i-col:#70D890;--i-br:#1A4828;
  --r-bg:#2A1008;--r-col:#F08070;--r-br:#5A2010;
  --v-bg:#0A1428;--v-col:#8090E0;--v-br:#182848;
  --note-bg:#1E1C10;--note-border:#3A3418;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:13px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── TOP BAR ── */
.topbar{
  background:var(--green);
  color:#fff;
  padding:0 28px;
  height:56px;
  display:flex;
  align-items:center;
  gap:20px;
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.topbar-brand{
  font-family:Georgia,serif;
  font-size:15px;
  letter-spacing:.01em;
  white-space:nowrap;
}
.topbar-brand span{color:var(--gold);margin-left:6px;}
.topbar-spacer{flex:1}
.week-nav{
  display:flex;align-items:center;gap:12px;
}
.nav-btn{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  width:32px;height:32px;
  border-radius:8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  transition:background .15s;
  flex-shrink:0;
}
.nav-btn:hover{background:rgba(255,255,255,.22);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.week-label{
  font-size:13px;
  font-weight:600;
  color:#fff;
  white-space:nowrap;
  min-width:200px;
  text-align:center;
}
.week-dots{
  display:flex;gap:6px;align-items:center;
}
.week-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.25);
  cursor:pointer;transition:background .15s, transform .15s;
}
.week-dot.active{background:var(--gold);transform:scale(1.3);}
.topbar-total{
  font-size:12px;
  color:rgba(255,255,255,.5);
  white-space:nowrap;
}

/* ── WEEK SUBTITLE ── */
.week-sub{
  background:var(--gold-light);
  border-bottom:1px solid var(--border);
  padding:8px 28px;
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
}
.week-theme{
  font-family:Georgia,serif;
  font-size:14px;
  color:var(--green);
}
.week-count-badge{
  font-size:11px;
  color:var(--gold);
  background:rgba(184,137,42,.12);
  border:1px solid rgba(184,137,42,.3);
  padding:2px 10px;border-radius:99px;
  font-weight:600;
}
.week-sub-spacer{flex:1}
.legend{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.leg-chip{
  font-size:10px;font-weight:700;letter-spacing:.06em;
  padding:2px 9px;border-radius:99px;border:1px solid;
}
.lc-s{background:var(--s-bg);color:var(--s-col);border-color:var(--s-br);}
.lc-i{background:var(--i-bg);color:var(--i-col);border-color:var(--i-br);}
.lc-r{background:var(--r-bg);color:var(--r-col);border-color:var(--r-br);}
.lc-v{background:var(--v-bg);color:var(--v-col);border-color:var(--v-br);}

/* ── CALENDAR GRID ── */
.cal-wrap{
  flex:1;
  overflow-x:auto;
  padding:0 28px 32px;
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(148px,1fr));
  gap:10px;
  min-width:900px;
  padding-top:14px;
}

/* ── DAY COLUMN ── */
.day-col{}
.day-head{
  padding:8px 10px 10px;
  border-radius:10px 10px 0 0;
  border:1px solid var(--border);
  border-bottom:2px solid var(--green);
  background:var(--surface);
  margin-bottom:6px;
  display:flex;align-items:baseline;gap:7px;
}
.day-head.empty-head{
  border-bottom-color:var(--border2);
  opacity:.5;
}
.day-name{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--sub);
  font-weight:600;
}
.day-date{
  font-size:20px;
  font-weight:700;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.day-month{
  font-size:11px;
  color:var(--sub);
}
.day-today .day-head{
  border-bottom-color:var(--gold);
  background:var(--gold-light);
}
.day-today .day-date{color:var(--gold);}

/* ── POST CARD ── */
.post-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  margin-bottom:6px;
  transition:box-shadow .15s;
}
.post-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}

.post-header{
  display:flex;align-items:center;gap:7px;
  margin-bottom:7px;
  flex-wrap:wrap;
}
.post-time{
  font-size:11px;color:var(--sub);
  font-variant-numeric:tabular-nums;
  flex-shrink:0;
}
.type-chip{
  font-size:10px;font-weight:700;letter-spacing:.06em;
  padding:2px 8px;border-radius:99px;border:1px solid;
  flex-shrink:0;
}
.tc-story{background:var(--s-bg);color:var(--s-col);border-color:var(--s-br);}
.tc-image{background:var(--i-bg);color:var(--i-col);border-color:var(--i-br);}
.tc-reel {background:var(--r-bg);color:var(--r-col);border-color:var(--r-br);}
.tc-video{background:var(--v-bg);color:var(--v-col);border-color:var(--v-br);}
.tc-kampania{background:#FEF0E6;color:#B04010;border-color:#F0B888;}
.tc-nagrywka{background:#F0EEFF;color:#4030A0;border-color:#B8A8F0;}

.post-title{
  font-size:12px;line-height:1.4;
  color:var(--text);
  font-weight:500;
  margin-bottom:6px;
}
.post-title.no-title{color:var(--sub);font-style:italic;}

.post-meta{
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  margin-bottom:8px;
}
.meta-goal{
  font-size:10px;padding:1px 7px;border-radius:99px;
  background:var(--green-light);color:var(--green2);
  font-weight:500;
}
.meta-status{
  font-size:10px;padding:1px 7px;border-radius:99px;
  font-weight:600;
}
.ms-draft   {background:#F0F0EC;color:#7A7A70;}
.ms-approved{background:#DCF8E8;color:#1A6A30;}
.ms-revision{background:#FEF8D0;color:#8A5800;}
.ms-aktywna {background:#DCF8E8;color:#1A6A30;font-weight:700;}

/* ── NOTES ── */
.notes-toggle{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--sub);
  cursor:pointer;
  padding:3px 0;
  user-select:none;
  border:none;background:none;
  font-family:inherit;
  transition:color .15s;
}
.notes-toggle:hover{color:var(--green);}
.notes-toggle svg{transition:transform .2s;}
.notes-toggle.open svg{transform:rotate(90deg);}
.notes-area{
  display:none;
  margin-top:7px;
}
.notes-area.visible{display:block;}
.notes-area textarea{
  width:100%;
  min-height:56px;
  resize:vertical;
  border:1px solid var(--note-border);
  border-radius:6px;
  background:var(--note-bg);
  color:var(--text);
  font-family:inherit;
  font-size:12px;
  line-height:1.4;
  padding:7px 9px;
  outline:none;
  transition:border-color .15s;
}
.notes-area textarea:focus{border-color:var(--gold);}
.notes-area textarea::placeholder{color:var(--sub);opacity:.6;}

/* ── ELA IDEAS SECTION ── */
.ela-section{
  margin:24px 28px 0;
  border:2px solid var(--green);
  border-radius:14px;
  background:var(--surface);
  overflow:hidden;
  box-shadow:0 4px 18px rgba(27,58,44,.10);
}
.ela-header{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;
  background:var(--green);
  cursor:pointer;
  user-select:none;
  transition:opacity .15s;
}
.ela-header:hover{opacity:.92;}
.ela-icon{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.35);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;
  flex-shrink:0;
  font-family:Georgia,serif;
}
.ela-title{
  font-size:15px;font-weight:700;
  color:#fff;
  font-family:Georgia,serif;
  flex:1;
  letter-spacing:.01em;
}
.ela-hint{font-size:11px;color:rgba(255,255,255,.65);white-space:nowrap;}
.ela-chevron{
  color:rgba(255,255,255,.8);
  transition:transform .2s;
}
.ela-chevron.open{transform:rotate(90deg);}
.ela-body{
  padding:18px 20px;
  display:none;
  background:var(--gold-light);
  border-top:1px solid var(--border);
}
.ela-body.visible{display:block;}
.ela-body textarea{
  width:100%;
  min-height:140px;
  resize:vertical;
  border:1px solid var(--border2);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  line-height:1.7;
  padding:12px 14px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.ela-body textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(27,58,44,.08);}
.ela-body textarea::placeholder{color:var(--sub);opacity:.6;}
.ela-char-count{
  font-size:10px;color:var(--sub);
  text-align:right;
  margin-top:6px;
}


/* ── EMPTY DAY ── */
.empty-day-msg{
  font-size:11px;color:var(--sub);
  padding:12px 10px;
  text-align:center;
  opacity:.5;
  font-style:italic;
}

/* ── WEEK PROGRESS ── */
.week-footer{
  padding:10px 28px 0;
  display:flex;gap:16px;align-items:center;
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.wf-stat{font-size:11px;color:var(--sub);}
.wf-stat strong{color:var(--text);}
.wf-spacer{flex:1}
.notes-hint{
  font-size:11px;color:var(--sub);
  display:flex;align-items:center;gap:5px;
}

/* ── MOBILE DAY PICKER ── */
.mobile-view{display:none;}

.mobile-day-strip{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:12px 14px;
  background:var(--surface);
  border-bottom:2px solid var(--border);
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  position:sticky;
  top:0;
  z-index:50;
}
.mobile-day-strip::-webkit-scrollbar{display:none;}

.mobile-day-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  min-width:52px;
  padding:9px 8px 12px;
  border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--surface);
  cursor:pointer;
  flex-shrink:0;
  transition:all .15s;
  position:relative;
}
.mobile-day-btn.active{
  background:var(--green);
  border-color:var(--green);
}
.mobile-day-btn.has-posts::after{
  content:'';
  position:absolute;
  bottom:5px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;
  background:var(--gold);
}
.mobile-day-btn.active::after{background:rgba(255,255,255,.7);}
.mdb-name{
  font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--sub);
}
.mdb-date{
  font-size:22px;font-weight:800;line-height:1;
  color:var(--text);font-variant-numeric:tabular-nums;
}
.mobile-day-btn.active .mdb-name,
.mobile-day-btn.active .mdb-date{color:#fff;}

.mobile-posts{
  padding:14px 14px 32px;
}
.mobile-day-title{
  font-size:15px;font-weight:700;color:var(--green);
  font-family:Georgia,serif;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.mobile-empty{
  text-align:center;padding:48px 20px;
  font-size:14px;color:var(--sub);font-style:italic;
}

@media(max-width:768px){
  /* topbar — 2 rzędy */
  .topbar{
    height:auto;
    padding:10px 16px;
    flex-wrap:wrap;
    gap:8px;
    position:sticky;top:0;z-index:100;
  }
  .topbar-brand{order:1;flex:1;font-size:14px;}
  .topbar-spacer{display:none;}
  .week-nav{order:2;width:100%;justify-content:center;gap:10px;}
  .week-label{min-width:0;font-size:13px;font-weight:700;}
  .week-dots,.topbar-total{display:none;}

  /* subtitle */
  .week-sub{padding:8px 16px;flex-wrap:wrap;gap:6px;}
  .week-theme{font-size:12px;}
  .week-count-badge{font-size:10px;}
  .legend{display:none;}

  /* ukryj desktop grid — pokaż mobile view */
  .cal-wrap{display:none;}
  .mobile-view{display:block;}

  /* ela i footer */
  .ela-section{margin:16px 14px 0;}
  .ela-header{padding:14px 16px;}
  .ela-body{padding:14px 16px;}
  .week-footer{padding:10px 16px 16px;flex-wrap:wrap;gap:6px;}
  .notes-hint{display:none;}
}
</style>

<script>
const DAY_NAMES = ['Ndz','Pon','Wt','Śr','Czw','Pt','Sb'];
const MONTH_NAMES = ['','sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];

// DOW computed automatically from actual date — no manual dow needed
function makeDow(year, month, date) {
  const js = new Date(year, month-1, date).getDay(); // 0=Sun
  return js === 0 ? 6 : js - 1; // convert to Mon=0..Sun=6
}
function d(date, month, posts) {
  return { date, month, dow: makeDow(2026, month, date), posts };
}

const WEEKS = [
  {
    label:'Tydzień 1 · 13–19 lipca',
    theme:'Summer Camp — Turnus I',
    days:[
      d(13,7,[
        {time:'09:00',type:'Story',title:'Summer Camp — sneak peek',goal:'wizerunkowe',status:'Needs Revision'},
        {time:'12:00',type:'Story',title:'Aktywności Summer Camp — relacja',goal:'wizerunkowe',status:'Approved'},
      ]),
      d(14,7,[
        {time:'10:00',type:'Image',title:'FSC — aktualne zdjęcia z aktywności',goal:'wizerunkowe',status:'Draft'},

      d(15,7,[

        {time:'12:00',type:'Story',title:'Zapisy do szkoły — link w bio',goal:'rekrutacja',status:'Draft'},
        {time:'16:00',type:'Story',title:'Zajęcia survival — snaps',goal:'wizerunkowe',status:'Draft'},
      ]),
      d(16,7,[
        {time:'10:00',type:'Reel',title:'Rolka — survival w lesie',goal:'angażujące',status:'Draft'},
        {time:'17:00',type:'Story',title:'Dzień na Summer Camp — snaps',goal:'wizerunkowe',status:'Draft'},
      ]),
      d(17,7,[
        {time:'10:00',type:'Video',title:'Podsumowanie dni + CTA Turnus II',goal:'angażujące',status:'Draft'},
        {time:'17:00',type:'Story',title:'Dzień na Summer Camp — snaps',goal:'wizerunkowe',status:'Draft'},
      ]),

const CAMPAIGNS = [
  {name:'Kampania FSC',      type:'Kampania', from:{d:20,m:7}, to:{d:25,m:7}},
  {name:'Kampania FS promo', type:'Kampania', from:{d:22,m:7}, to:{d:31,m:7}},
];

const NAGRYWKI = [
  {title:'Nagrywki Ela',   type:'Nagrywka', date:22, month:7},
  {title:'Nagrywki Paweł', type:'Nagrywka', date:28, month:7, note:'data do ustalenia'},
];

function dateVal(d,m){return m*100+d;}

function extraPostsForDay(date,month){
  const v=dateVal(date,month);
  const posts=[];
  CAMPAIGNS.forEach(c=>{
    if(v>=dateVal(c.from.d,c.from.m)&&v<=dateVal(c.to.d,c.to.m))
      posts.push({type:c.type, title:c.name, goal:'—', status:'Aktywna', time:''});
  });
  NAGRYWKI.forEach(n=>{
    if(n.date===date&&n.month===month)
      posts.push({type:n.type, title:n.title+(n.note?' ('+n.note+')':''), goal:'—', status:'Draft', time:''});
  });
  return posts;
}

// Order: Mon(0) Tue(1) Wed(2) Thu(3) Fri(4) Sat(5) Sun(6)
const DOW_ORDER = [0,1,2,3,4,5,6];
const DOW_NAMES = ['Pon','Wt','Śr','Czw','Pt','Sb','Ndz'];

let currentWeek = 0;
const today = new Date();

function typeClass(t){
  return {Story:'tc-story',Image:'tc-image',Reel:'tc-reel',Video:'tc-video',Kampania:'tc-kampania',Nagrywka:'tc-nagrywka'}[t]||'tc-story';
}
function statusClass(s){
  if(s==='Approved') return 'ms-approved';
  if(s==='Needs Revision') return 'ms-revision';
  if(s==='Aktywna') return 'ms-aktywna';
  return 'ms-draft';
}
function statusLabel(s){
  if(s==='Approved') return '✓ Zatwierdzone';
  if(s==='Needs Revision') return '⚠ Do poprawki';
  if(s==='Aktywna') return '▶ Aktywna';
  return 'Draft';
}
function goalLabel(g){
  const map={wizerunkowe:'wizerunek',angażujące:'angażowanie',rekrutacja:'rekrutacja',udostępnialne:'udostępnianie'};
  return map[g]||'';
}

function noteKey(wi,dayDate,dayMonth,pi){
  return `fs_note_w${wi}_${dayMonth}${dayDate}_p${pi}`;
}

function renderWeek(wi){
  const week = WEEKS[wi];
  document.getElementById('weekLabel').textContent = week.label;
  document.getElementById('weekTheme').textContent = week.theme;

  // count posts
  const total = week.days.reduce((s,d)=>s+d.posts.length,0);
  document.getElementById('weekCountBadge').textContent = total + ' postów';
  document.getElementById('wfStat').innerHTML = `Tydzień <strong>${wi+1} z ${WEEKS.length}</strong> &nbsp;·&nbsp; <strong>${total}</strong> postów`;

  // dots
  const dotsEl = document.getElementById('weekDots');
  dotsEl.innerHTML = WEEKS.map((_,i)=>
    `<div class="week-dot${i===wi?' active':''}" onclick="changeWeek(${i-currentWeek})" title="Tydzień ${i+1}"></div>`
  ).join('');

  // nav buttons
  document.getElementById('prevBtn').disabled = wi===0;
  document.getElementById('nextBtn').disabled = wi===WEEKS.length-1;

  // sort days by DOW (Mon=0 first, Sun=6 last)
  const sorted = [...week.days].sort((a,b)=>a.dow-b.dow);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  sorted.forEach(day=>{
    const isToday = (today.getDate()===day.date && today.getMonth()+1===day.month);
    const dowName = DOW_NAMES[day.dow];
    const extraPosts = extraPostsForDay(day.date, day.month);
    const allPosts = [...day.posts, ...extraPosts];
    const isEmptyAll = allPosts.length === 0;

    const col = document.createElement('div');
    col.className = 'day-col' + (isEmptyAll ? ' is-empty-mobile' : '');

    col.innerHTML = `
      <div class="day-head${isToday?' day-today-head':''}${isEmptyAll?' empty-head':''}">
        <span class="day-name">${dowName}</span>
        <span class="day-date">${day.date}</span>
        <span class="day-month">${MONTH_NAMES[day.month]}</span>
      </div>`;

    if(isEmptyAll){
      const em=document.createElement('div');
      em.className='empty-day-msg';
      em.textContent='—';
      col.appendChild(em);
    } else {
      allPosts.forEach((post,pi)=>{
        const key=noteKey(wi,day.date,day.month,pi);
        const savedNote=localStorage.getItem(key)||'';
        const hasNote=savedNote.length>0;

        const card=document.createElement('div');
        card.className='post-card';

        const goalHtml=goalLabel(post.goal)?`<span class="meta-goal">${goalLabel(post.goal)}</span>`:'';
        const statusHtml=`<span class="meta-status ${statusClass(post.status)}">${statusLabel(post.status)}</span>`;
        const titleClass=(!post.title||post.title==='—')?'post-title no-title':'post-title';
        const titleText=(!post.title||post.title==='—')?'(tytuł do ustalenia)':post.title;

        card.innerHTML=`
          <div class="post-header">
            <span class="post-time">${post.time}</span>
            <span class="type-chip ${typeClass(post.type)}">${post.type}</span>
          </div>
          <div class="${titleClass}">${titleText}</div>
          <div class="post-meta">${goalHtml}${statusHtml}</div>
          <button class="notes-toggle${hasNote?' open':''}" onclick="toggleNote(this,'${key}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            ${hasNote?'Notatki Eli ('+savedNote.length+'zn.)':'Notatki Eli'}
          </button>
          <div class="notes-area${hasNote?' visible':''}">
            <textarea placeholder="Dodaj uwagi, briefing, linki…" oninput="saveNote(this,'${key}',this.closest('.post-card').querySelector('.notes-toggle'))">${savedNote}</textarea>
          </div>`;
        col.appendChild(card);
      });
    }
    grid.appendChild(col);
  });

  loadEla(wi);
  renderMobile(wi);
}

function toggleNote(btn,key){
  const area=btn.nextElementSibling;
  const visible=area.classList.toggle('visible');
  btn.classList.toggle('open',visible);
  if(visible) area.querySelector('textarea').focus();
}

function saveNote(ta,key,toggleBtn){
  localStorage.setItem(key,ta.value);
  const len=ta.value.length;
  const hasNote=len>0;
  toggleBtn.innerHTML=`
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    ${hasNote?'Notatki Eli ('+len+'zn.)':'Notatki Eli'}`;
}

function elaKey(wi){ return `fs_ela_w${wi}`; }

function toggleEla(){
  const body=document.getElementById('elaBody');
  const chevron=document.getElementById('elaChevron');
  const hint=document.getElementById('elaHint');
  const visible=body.classList.toggle('visible');
  chevron.classList.toggle('open',visible);
  if(visible){
    body.querySelector('textarea').focus();
    hint.textContent='kliknij, żeby zwinąć';
  } else {
    hint.textContent='kliknij, żeby rozwinąć';
  }
}

function saveEla(ta){
  localStorage.setItem(elaKey(currentWeek),ta.value);
  const len=ta.value.length;
  document.getElementById('elaCharCount').textContent=len>0?len+' znaków':'';
}

function loadEla(wi){
  const saved=localStorage.getItem(elaKey(wi))||'';
  const ta=document.getElementById('elaTextarea');
  ta.value=saved;
  document.getElementById('elaCharCount').textContent=saved.length>0?saved.length+' znaków':'';
  // if there's content, show hint that notes exist
  const hint=document.getElementById('elaHint');
  const body=document.getElementById('elaBody');
  if(!body.classList.contains('visible')){
    hint.textContent=saved.length>0?saved.length+' zn. · kliknij, żeby rozwinąć':'kliknij, żeby rozwinąć';
  }
}

let mobileSortedDays = [];
let mobileWeekIndex = 0;

function renderMobile(wi) {
  mobileWeekIndex = wi;
  const week = WEEKS[wi];
  const sorted = [...week.days].sort((a,b) => a.dow - b.dow);
  mobileSortedDays = sorted.map(day => {
    const extra = extraPostsForDay(day.date, day.month);
    return { ...day, allPosts: [...day.posts, ...extra] };
  });

  // build day strip
  const strip = document.getElementById('mobileDayStrip');
  strip.innerHTML = mobileSortedDays.map((day, i) => {
    const hasPosts = day.allPosts.length > 0;
    return `<button class="mobile-day-btn${hasPosts?' has-posts':''}" onclick="selectMobileDay(${i})" id="mdb-${i}">
      <span class="mdb-name">${DOW_NAMES[day.dow]}</span>
      <span class="mdb-date">${day.date}</span>
    </button>`;
  }).join('');

  // auto-select: today if in week, else first day with posts
  let defaultIdx = mobileSortedDays.findIndex(d =>
    today.getDate()===d.date && today.getMonth()+1===d.month
  );
  if(defaultIdx < 0) defaultIdx = mobileSortedDays.findIndex(d => d.allPosts.length > 0);
  if(defaultIdx < 0) defaultIdx = 0;
  selectMobileDay(defaultIdx);
}

function selectMobileDay(idx) {
  // update strip active state
  mobileSortedDays.forEach((_, i) => {
    const btn = document.getElementById('mdb-'+i);
    if(btn) btn.classList.toggle('active', i===idx);
  });

  const day = mobileSortedDays[idx];
  const postsEl = document.getElementById('mobilePosts');

  if(!day || day.allPosts.length === 0) {
    postsEl.innerHTML = `<div class="mobile-day-title">${DOW_NAMES[day.dow]}, ${day.date} ${MONTH_NAMES[day.month]}</div><div class="mobile-empty">Brak postów w tym dniu</div>`;
    return;
  }

  const wi = mobileWeekIndex;
  let html = `<div class="mobile-day-title">${DOW_NAMES[day.dow]}, ${day.date} ${MONTH_NAMES[day.month]}</div>`;

  day.allPosts.forEach((post, pi) => {
    const key = noteKey(wi, day.date, day.month, pi);
    const savedNote = localStorage.getItem(key) || '';
    const hasNote = savedNote.length > 0;
    const goalHtml = goalLabel(post.goal) ? `<span class="meta-goal">${goalLabel(post.goal)}</span>` : '';
    const statusHtml = `<span class="meta-status ${statusClass(post.status)}">${statusLabel(post.status)}</span>`;
    const titleClass = (!post.title||post.title==='—') ? 'post-title no-title' : 'post-title';
    const titleText = (!post.title||post.title==='—') ? '(tytuł do ustalenia)' : post.title;

    html += `<div class="post-card">
      <div class="post-header">
        ${post.time ? `<span class="post-time">${post.time}</span>` : ''}
        <span class="type-chip ${typeClass(post.type)}">${post.type}</span>
      </div>
      <div class="${titleClass}">${titleText}</div>
      <div class="post-meta">${goalHtml}${statusHtml}</div>
      <button class="notes-toggle${hasNote?' open':''}" onclick="toggleNote(this,'${key}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        ${hasNote?'Notatki Eli ('+savedNote.length+'zn.)':'Notatki Eli'}
      </button>
      <div class="notes-area${hasNote?' visible':''}">
        <textarea placeholder="Dodaj uwagi, briefing, linki…" oninput="saveNote(this,'${key}',this.closest('.post-card').querySelector('.notes-toggle'))">${savedNote}</textarea>
      </div>
    </div>`;
  });

  postsEl.innerHTML = html;
}

function isMobile() { return window.innerWidth <= 768; }

function changeWeek(delta){
  const next=currentWeek+delta;
  if(next<0||next>=WEEKS.length) return;
  currentWeek=next;
  renderWeek(currentWeek);
  window.scrollTo({top:0,behavior:'smooth'});
}

// keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&!e.target.matches('textarea')) changeWeek(1);
  if(e.key==='ArrowLeft'&&!e.target.matches('textarea')) changeWeek(-1);
});

renderWeek(0);

// re-render mobile on resize
window.addEventListener('resize', () => {
  if(isMobile()) renderMobile(currentWeek);
});
</script>
