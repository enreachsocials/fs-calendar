<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Future Schooling · Plan Contentu</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5F3EE;--surface:#FFFFFF;--green:#1B3A2C;--green2:#2C5E42;
  --green-light:#EAF2EC;--gold:#B8892A;--gold-light:#F9F3E8;
  --text:#1A1A18;--sub:#6B7060;--border:#DFE3D8;--border2:#C8D0C0;
  --s-bg:#FFF8EB;--s-col:#996600;--s-br:#F0D080;
  --i-bg:#EDF8F0;--i-col:#1A6B3C;--i-br:#90D8A8;
  --r-bg:#FFF0EE;--r-col:#B52A1A;--r-br:#F0A898;
  --v-bg:#EEF2FF;--v-col:#2040A8;--v-br:#A8B8F0;
  --note-bg:#FFFDF5;--note-border:#E8D89A;
  --topbar-h:106px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111610;--surface:#1A2018;--green:#7EB898;--green2:#5A9070;
  --green-light:#192218;--gold:#C8A860;--gold-light:#221A08;
  --text:#E8EDE2;--sub:#8A9880;--border:#252E22;--border2:#303828;
  --s-bg:#2A2008;--s-col:#D4A030;--s-br:#5A4010;
  --i-bg:#0A2018;--i-col:#70D890;--i-br:#1A4828;
  --r-bg:#2A1008;--r-col:#F08070;--r-br:#5A2010;
  --v-bg:#0A1428;--v-col:#8090E0;--v-br:#182848;
  --note-bg:#1E1C10;--note-border:#3A3418;
}}

html,body{width:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--green);color:#fff;
  font-size:14px;font-weight:600;
  padding:12px 28px;border-radius:40px;
  box-shadow:0 4px 24px rgba(0,0,0,.22);
  opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:9999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── TOPBAR ── */
.topbar{
  background:var(--green);color:#fff;
  position:sticky;top:0;z-index:100;
  width:100%;
}
.tb-row1{
  display:flex;align-items:center;gap:10px;
  height:52px;padding:0 16px;
}
.tb-brand{font-family:Georgia,serif;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-brand span{color:var(--gold);}
.tb-sync{font-size:13px;color:rgba(255,255,255,.45);flex-shrink:0;}
.tb-row2{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:6px 16px 10px;
  border-top:1px solid rgba(255,255,255,.1);
}
.nav-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;width:36px;height:36px;border-radius:8px;
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.nav-btn:disabled{opacity:.3;cursor:default;}
.week-label{font-size:13px;font-weight:700;color:#fff;flex:1;text-align:center;min-width:0;}
.week-dots{display:flex;gap:6px;align-items:center;}
.week-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.25);cursor:pointer;
  transition:background .15s,transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.week-dot.active{background:var(--gold);transform:scale(1.3);}

/* desktop nav — hidden on mobile */
.tb-desktop-nav{display:none;align-items:center;gap:10px;}

/* ── WEEK SUBTITLE ── */
.week-sub{
  background:var(--gold-light);border-bottom:1px solid var(--border);
  padding:9px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.week-theme{font-family:Georgia,serif;font-size:13px;color:var(--green);flex:1;min-width:0;}
.week-badge{
  font-size:11px;color:var(--gold);
  background:rgba(184,137,42,.12);border:1px solid rgba(184,137,42,.3);
  padding:2px 10px;border-radius:99px;font-weight:600;white-space:nowrap;flex-shrink:0;
}

/* ── TYPE / STATUS CHIPS ── */
.type-chip{font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap;flex-shrink:0;}
.tc-story   {background:var(--s-bg);color:var(--s-col);border-color:var(--s-br);}
.tc-image   {background:var(--i-bg);color:var(--i-col);border-color:var(--i-br);}
.tc-reel    {background:var(--r-bg);color:var(--r-col);border-color:var(--r-br);}
.tc-video   {background:var(--v-bg);color:var(--v-col);border-color:var(--v-br);}
.tc-kampania{background:#FEF0E6;color:#B04010;border-color:#F0B888;}
.tc-nagrywka{background:#F0EEFF;color:#4030A0;border-color:#B8A8F0;}
.meta-status{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:600;white-space:nowrap;}
.ms-draft   {background:#F0F0EC;color:#7A7A70;}
.ms-approved{background:#DCF8E8;color:#1A6A30;}
.ms-revision{background:#FEF8D0;color:#8A5800;}
.ms-aktywna {background:#DCF8E8;color:#1A6A30;font-weight:700;}
.meta-goal  {font-size:10px;padding:1px 7px;border-radius:99px;background:var(--green-light);color:var(--green2);font-weight:500;white-space:nowrap;}

/* ── POST CARD ── */
.post-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:8px;
  width:100%;
}
.post-header{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.post-time{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums;}
.post-title{
  font-size:13px;line-height:1.45;color:var(--text);font-weight:500;
  margin-bottom:7px;overflow-wrap:break-word;word-break:break-word;
}
.post-title.empty{color:var(--sub);font-style:italic;}
.post-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}

/* ── NOTES ── */
.notes-toggle{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--sub);cursor:pointer;
  padding:3px 0;user-select:none;
  border:none;background:none;font-family:inherit;
  transition:color .15s;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.notes-toggle svg{transition:transform .2s;flex-shrink:0;}
.notes-toggle.open svg{transform:rotate(90deg);}
.notes-area{display:none;margin-top:7px;}
.notes-area.visible{display:block;}
.notes-area textarea{
  width:100%;min-height:60px;resize:vertical;
  border:1px solid var(--note-border);border-radius:6px;
  background:var(--note-bg);color:var(--text);
  font-family:inherit;font-size:13px;line-height:1.5;
  padding:8px 10px;outline:none;transition:border-color .15s;
}
.notes-area textarea:focus{border-color:var(--gold);}
.notes-area textarea::placeholder{color:var(--sub);opacity:.6;}
.done-btn{
  display:block;width:100%;margin-top:8px;padding:12px;
  background:var(--green);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

/* ── ELA SECTION ── */
.ela-section{margin:20px 14px 0;max-width:calc(100vw - 28px);border:2px solid var(--green);border-radius:14px;background:var(--surface);overflow:hidden;box-shadow:0 4px 18px rgba(27,58,44,.10);}
.ela-header{display:flex;align-items:center;gap:12px;padding:16px 18px;background:var(--green);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.ela-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;font-family:Georgia,serif;}
.ela-title{font-size:15px;font-weight:700;color:#fff;font-family:Georgia,serif;flex:1;}
.ela-chevron{color:rgba(255,255,255,.8);transition:transform .2s;flex-shrink:0;}
.ela-chevron.open{transform:rotate(90deg);}
.ela-body{padding:16px;display:none;background:var(--gold-light);}
.ela-body.visible{display:block;}
.ela-body textarea{width:100%;max-width:100%;min-height:120px;resize:vertical;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;line-height:1.7;padding:12px 14px;outline:none;transition:border-color .15s;-webkit-box-sizing:border-box;box-sizing:border-box;}
.ela-body textarea:focus{border-color:var(--green);}
.ela-body textarea::placeholder{color:var(--sub);opacity:.6;}
.ela-count{font-size:10px;color:var(--sub);text-align:right;margin-top:5px;}

/* ── FOOTER ── */
.week-footer{padding:14px 16px 40px;font-size:11px;color:var(--sub);text-align:center;}

/* ══════════════════
   MOBILE (base)
══════════════════ */

/* Day strip — CSS grid, all 7 fit */
.day-strip{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;
  padding:8px 10px;background:var(--surface);
  border-bottom:2px solid var(--border);
  position:sticky;top:106px;z-index:50;
}
.day-btn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:6px 2px 9px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .12s;position:relative;
  min-width:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.day-btn.active{background:var(--green);border-color:var(--green);}
.day-btn.has-posts::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);}
.day-btn.active::after{background:rgba(255,255,255,.7);}
.dbn{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--sub);}
.dbd{font-size:17px;font-weight:800;line-height:1;color:var(--text);font-variant-numeric:tabular-nums;}
.day-btn.active .dbn,.day-btn.active .dbd{color:#fff;}

/* Posts area */
.posts-area{padding:14px 14px 16px;}
.day-nav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;}
.day-nav-title{font-size:15px;font-weight:700;color:var(--green);font-family:Georgia,serif;text-align:center;flex:1;min-width:0;}
.day-nav-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);width:38px;height:38px;border-radius:8px;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.day-nav-btn:disabled{opacity:.25;cursor:default;}
.day-empty{text-align:center;padding:40px 20px;font-size:14px;color:var(--sub);font-style:italic;}

/* Desktop grid — hidden on mobile */
.desktop-wrap{display:none;}

/* ══════════════════
   DESKTOP
══════════════════ */
@media(min-width:769px){
  :root{--topbar-h:56px;}

  /* Topbar — single row */
  .tb-row2{display:none;}
  .tb-row1{padding:0 28px;height:56px;}
  .tb-brand{font-size:15px;}
  .tb-desktop-nav{display:flex;}

  /* subtitle */
  .week-sub{padding:9px 28px;}

  /* hide mobile UI */
  .day-strip{display:none;}
  .posts-area{display:none;}

  /* show desktop grid */
  .desktop-wrap{display:block;overflow-x:auto;padding:0 28px 32px;}
  .desktop-grid{display:grid;grid-template-columns:repeat(7,minmax(138px,1fr));gap:10px;min-width:880px;padding-top:14px;}

  .day-head{padding:8px 10px 10px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:2px solid var(--green);background:var(--surface);margin-bottom:6px;display:flex;align-items:baseline;gap:6px;}
  .day-head.empty-h{border-bottom-color:var(--border2);opacity:.5;}
  .day-head.today-h{border-bottom-color:var(--gold);background:var(--gold-light);}
  .dh-name{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);font-weight:600;}
  .dh-date{font-size:20px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;}
  .dh-date.today-d{color:var(--gold);}
  .dh-month{font-size:10px;color:var(--sub);}
  .empty-day-msg{font-size:11px;color:var(--sub);padding:12px 10px;text-align:center;opacity:.5;font-style:italic;}

  /* ela */
  .ela-section{margin:24px 28px 0;}
  .week-footer{padding:14px 28px 36px;text-align:left;}

  /* hide done-btn on desktop */
  .done-btn{display:none;}
}
</style>
</head>

<div class="week-footer" id="weekFooter"></div>

function setSync(s){
  const el=document.getElementById('syncStatus');if(!el)return;
  el.textContent=s==='ok'?'●':s==='sync'?'↑':'○';
  el.style.color=s==='ok'?'#7EB898':s==='sync'?'rgba(255,255,255,.7)':'rgba(255,255,255,.4)';
}
async function sbLoad(){
  if(!sb)return;
  try{const{data}=await sb.from('fs_notes').select('key,value');
    if(data)data.forEach(r=>localStorage.setItem(r.key,r.value));setSync('ok');}
  catch{setSync('err');}
}
async function sbSave(key,value){
  if(!sb)return;setSync('sync');
  try{await sb.from('fs_notes').upsert({key,value});setSync('ok');}
  catch{setSync('err');}
}

const CAMPAIGNS=[
  {name:'Kampania FSC',type:'Kampania',from:{d:20,m:7},to:{d:25,m:7}},
  {name:'Kampania FS promo',type:'Kampania',from:{d:22,m:7},to:{d:31,m:7}},
];
const NAGRYWKI=[
  {title:'Nagrywki Ela',type:'Nagrywka',date:22,month:7},
  {title:'Nagrywki Paweł',type:'Nagrywka',date:28,month:7,note:'data do ustalenia'},
];

function dv(d,m){return m*100+d;}
function extra(date,month){
  const v=dv(date,month),posts=[];
  CAMPAIGNS.forEach(c=>{if(v>=dv(c.from.d,c.from.m)&&v<=dv(c.to.d,c.to.m))posts.push({type:c.type,title:c.name,goal:'—',status:'Aktywna',time:''});});
  NAGRYWKI.forEach(n=>{if(n.date===date&&n.month===month)posts.push({type:n.type,title:n.title+(n.note?` (${n.note})`:''),goal:'—',status:'Draft',time:''});});
  return posts;
}

function tC(t){return{Story:'tc-story',Image:'tc-image',Reel:'tc-reel',Video:'tc-video',Kampania:'tc-kampania',Nagrywka:'tc-nagrywka'}[t]||'tc-story';}
function sC(s){return s==='Approved'?'ms-approved':s==='Needs Revision'?'ms-revision':s==='Aktywna'?'ms-aktywna':'ms-draft';}
function sL(s){return s==='Approved'?'✓ Zatwierdzone':s==='Needs Revision'?'⚠ Do poprawki':s==='Aktywna'?'▶ Aktywna':'Draft';}
function gL(g){return{wizerunkowe:'wizerunek',angażujące:'angażowanie',rekrutacja:'rekrutacja',udostępnialne:'udostępnianie'}[g]||'';}
function nk(wi,d,m,pi){return`fs_note_w${wi}_${m}${d}_p${pi}`;}
function ek(wi){return`fs_ela_w${wi}`;}

/* ── STATE ── */
let curWeek=0;
const today=new Date();

/* ── CARD HTML ── */
function card(wi,d,pi,post){
  const key=nk(wi,d.date,d.month,pi);
  const sv=localStorage.getItem(key)||'';
  const hn=sv.length>0;
  const isEmpty=!post.title||post.title==='—';
  const gH=gL(post.goal)?`<span class="meta-goal">${gL(post.goal)}</span>`:'';
  return`<div class="post-card">
    <div class="post-header">
      ${post.time?`<span class="post-time">${post.time}</span>`:''}
      <span class="type-chip ${tC(post.type)}">${post.type}</span>
    </div>
    <div class="post-title${isEmpty?' empty':''}">${isEmpty?'(tytuł do ustalenia)':post.title}</div>
    <div class="post-meta">${gH}<span class="meta-status ${sC(post.status)}">${sL(post.status)}</span></div>
    <button class="notes-toggle${hn?' open':''}" onclick="toggleNote(this,'${key}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      ${hn?`Notatki Eli (${sv.length}zn.)`:'Notatki Eli'}
    </button>
    <div class="notes-area${hn?' visible':''}">
      <textarea placeholder="Dodaj uwagi, briefing, linki…" oninput="saveNote(this,'${key}',this.closest('.post-card').querySelector('.notes-toggle'))">${sv}</textarea>
      <button class="done-btn" onclick="this.previousElementSibling.blur();showToast('✓ Zapisano!')">✓ Gotowe</button>
    </div>
  </div>`;
}

/* ── RENDER WEEK ── */
function render(wi){
  curWeek=wi;
  const w=WEEKS[wi];
  const sorted=[...w.days].sort((a,b)=>a.dow-b.dow).map(d=>({...d,all:[...d.posts,...extra(d.date,d.month)]}));
  const total=w.days.reduce((s,d)=>s+d.posts.length,0);

  // labels & badges
  ['weekLabelD','weekLabelM'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=w.label;});
  document.getElementById('weekTheme').textContent=w.theme;
  document.getElementById('weekBadge').textContent=total+' postów';
  document.getElementById('weekFooter').textContent=`Tydzień ${wi+1} z ${WEEKS.length} · ${total} postów`;

  // nav buttons
  ['prevBtnD','prevBtnM'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=wi===0;});
  ['nextBtnD','nextBtnM'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=wi===WEEKS.length-1;});

  // dots
  ['weekDotsD','weekDotsM'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.innerHTML=WEEKS.map((_,i)=>`<div class="week-dot${i===wi?' active':''}" onclick="changeWeek(${i-wi})"></div>`).join('');
  });

  renderMobile(wi,sorted);
  renderDesktop(wi,sorted);
  loadEla(wi);
}

/* ── MOBILE ── */
let mD=[],mI=0,mW=0;

function renderMobile(wi,sorted){
  mW=wi;mD=sorted;
  document.getElementById('dayStrip').innerHTML=sorted.map((d,i)=>
    `<button class="day-btn${d.all.length?' has-posts':''}${i===mI?' active':''}" onclick="selDay(${i})" id="mb${i}">
      <span class="dbn">${DOW[d.dow]}</span>
      <span class="dbd">${d.date}</span>
    </button>`
  ).join('');
  // auto-select today or first with posts
  let def=sorted.findIndex(d=>d.date===today.getDate()&&d.month===today.getMonth()+1);
  if(def<0)def=sorted.findIndex(d=>d.all.length>0);
  if(def<0)def=0;
  selDay(def);
}

function selDay(idx){
  mI=idx;
  mD.forEach((_,i)=>{const b=document.getElementById('mb'+i);if(b)b.classList.toggle('active',i===idx);});
  const d=mD[idx],wi=mW;
  const hp=idx>0,hn=idx<mD.length-1;
  let html=`<div class="day-nav">
    <button class="day-nav-btn" onclick="selDay(${idx-1})" ${hp?'':'disabled'}>←</button>
    <div class="day-nav-title">${DOW[d.dow]}, ${d.date} ${MON[d.month]}</div>
    <button class="day-nav-btn" onclick="selDay(${idx+1})" ${hn?'':'disabled'}>→</button>
  </div>`;
  if(!d.all.length){html+=`<div class="day-empty">Brak postów w tym dniu</div>`;}
  else{d.all.forEach((p,pi)=>{html+=card(wi,d,pi,p);});}
  document.getElementById('postsArea').innerHTML=html;
}

/* ── DESKTOP ── */
function renderDesktop(wi,sorted){
  const grid=document.getElementById('desktopGrid');
  grid.innerHTML='';
  sorted.forEach(d=>{
    const isT=d.date===today.getDate()&&d.month===today.getMonth()+1;
    const empty=d.all.length===0;
    const col=document.createElement('div');
    col.innerHTML=`<div class="day-head${empty?' empty-h':''}${isT?' today-h':''}">
      <span class="dh-name">${DOW[d.dow]}</span>
      <span class="dh-date${isT?' today-d':''}">${d.date}</span>
      <span class="dh-month">${MON[d.month]}</span>
    </div>`;
    if(empty){col.insertAdjacentHTML('beforeend',`<div class="empty-day-msg">—</div>`);}
    else{d.all.forEach((p,pi)=>col.insertAdjacentHTML('beforeend',card(wi,d,pi,p)));}
    grid.appendChild(col);
  });
}

/* ── INTERACTIONS ── */
function toggleNote(btn,key){
  const area=btn.nextElementSibling;
  const vis=area.classList.toggle('visible');
  btn.classList.toggle('open',vis);
  if(vis)area.querySelector('textarea').focus();
}
function saveNote(ta,key,btn){
  localStorage.setItem(key,ta.value);
  const len=ta.value.length;
  btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>${len?`Notatki Eli (${len}zn.)`:'Notatki Eli'}`;
  showToast('✓ Zapisano!');
  sbSave(key,ta.value);
}
function toggleEla(){
  const body=document.getElementById('elaBody');
  const chev=document.getElementById('elaChev');
  const vis=body.classList.toggle('visible');
  chev.classList.toggle('open',vis);
  if(vis)document.getElementById('elaTa').focus();
}
function saveEla(ta){
  const key=ek(curWeek);
  localStorage.setItem(key,ta.value);
  document.getElementById('elaCount').textContent=ta.value.length?ta.value.length+' znaków':'';
  showToast('✓ Zapisano!');
  sbSave(key,ta.value);
}
function loadEla(wi){
  const sv=localStorage.getItem(ek(wi))||'';
  document.getElementById('elaTa').value=sv;
  document.getElementById('elaCount').textContent=sv.length?sv.length+' znaków':'';
  // close ela on week change
  document.getElementById('elaBody').classList.remove('visible');
  document.getElementById('elaChev').classList.remove('open');
}
function changeWeek(delta){
  const n=curWeek+delta;
  if(n<0||n>=WEEKS.length)return;
  window.scrollTo({top:0,behavior:'smooth'});
  render(n);
}

/* ── SWIPE ── */
let _tx=0;
document.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_tx;
  if(Math.abs(dx)<60)return;
  if(e.target.closest('textarea,.day-strip'))return;
  if(dx<0&&mI<mD.length-1)selDay(mI+1);
  else if(dx>0&&mI>0)selDay(mI-1);
},{passive:true});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.target.matches('textarea'))return;
  if(e.key==='ArrowRight')changeWeek(1);
  if(e.key==='ArrowLeft')changeWeek(-1);
});

/* ── INIT ── */
let startW=0;
WEEKS.forEach((w,wi)=>w.days.forEach(d=>{
  if(d.month===today.getMonth()+1&&d.date===today.getDate())startW=wi;
}));

sbLoad().finally(()=>render(startW));
</script>
